# ─── Server ───
# Cloud providers (Render, Railway) inject PORT env var
server.port=${PORT:8080}

# ─── Database ───
# Supports both formats:
#   - Local: jdbc:postgresql://localhost:5432/impactbridge
#   - Cloud: postgres://user:pass@host:5432/dbname (auto-converted)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/impactbridge}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ─── Connection Pool (prevent cloud timeouts) ───
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ─── Jackson ───
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ─── External Service URLs ───
frontend.url=${FRONTEND_URL:http://localhost:5173}
ai.service.url=${AI_SERVICE_URL:http://localhost:3001}

# ─── OpenAPI ───
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
